<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastWord Sarawak</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --night: #0A0B0F;
            --lane: #1C1F2B;
            --text-bright: #F0EEE8;
            --text-mid: #9A97A8;
            --neon-gold: #F5C842;
            --neon-teal: #00E5B4;
            --neon-red: #FF3B3B;
            --neon-blue: #3B82F6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--night);
            color: var(--text-bright);
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            user-select: none;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(10,11,15,0.95);
            padding: 24px; z-index: 10;
        }
        .screen.hidden { display: none; }

        h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 8vw, 52px); font-weight: 800; line-height: 1.1; text-align: center; }
        h1 span { color: var(--neon-gold); }
        p { color: var(--text-mid); font-size: 14px; text-align: center; max-width: 400px; margin: 15px 0; }

        button.btn {
            background: transparent; border: 1px solid rgba(245,200,66,0.5);
            color: var(--neon-gold); font-family: 'Space Mono', monospace; font-size: 14px;
            padding: 12px 32px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; margin-top: 10px; width: 100%; max-width: 300px;
        }
        button.btn:active, button.btn:hover { background: rgba(245,200,66,0.15); border-color: var(--neon-gold); }

        #game-ui { position: absolute; inset: 0; pointer-events: none; z-index: 5; display: flex; flex-direction: column; justify-content: space-between; }
        .hidden { display: none !important; }

        #top-hud {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .hud-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .hud-lbl { font-size: 9px; color: var(--text-mid); text-transform: uppercase; letter-spacing: 1px; }
        .hud-val { font-size: 15px; font-weight: 700; color: var(--neon-gold); }

        #progress-wrap { flex: 1; margin: 0 15px; text-align: center; }
        #track-name { font-size: 10px; color: var(--text-bright); text-transform: uppercase; display: block; margin-bottom: 4px;}
        #progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--neon-gold); width: 0%; transition: width 0.3s; }

        #center-ui { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        #prompt-text { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 800; text-align: center; position: absolute; top: 15%; transition: opacity 0.2s; opacity: 0; }
        #audio-cue { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 800; color: var(--neon-gold); position: absolute; top: 15%; animation: pulse 1s infinite; display: none; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }

        #banner-wrap {
            display: flex; justify-content: space-between; width: 80%; max-width: 400px;
            position: absolute; top: 45%; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            transform: translateY(-200%); opacity: 0;
        }
        #banner-wrap.visible { transform: translateY(0); opacity: 1; }

        .banner {
            background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.3);
            padding: 12px 20px; font-size: 14px; font-weight: 700; border-radius: 6px;
            text-align: center; min-width: 130px; transition: all 0.2s;
        }
        .banner.correct { border-color: var(--neon-teal); color: var(--neon-teal); background: rgba(0,229,180,0.15); }
        .banner.wrong { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255,59,59,0.15); }

        #feedback-text {
            position: absolute; top: 30%; font-family: 'JetBrains Mono', sans-serif; font-size: 24px; font-weight: 800;
            text-align: center; opacity: 0; transform: scale(0.8); transition: all 0.2s;
        }
        #feedback-text.pop { opacity: 1; transform: scale(1); }

        #controls { display: flex; height: 90px; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.1); pointer-events: all; }
        .sound-btn {
            position: fixed; top: 12px; right: 12px; z-index: 2000;
            background: rgba(0,0,0,0.78); border: 1px solid rgba(245,200,66,0.35);
            color: var(--neon-gold); padding: 6px 10px; border-radius: 999px;
            font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer;
            pointer-events: all; line-height: 1; min-width: 72px; text-transform: uppercase;
        }
        .ctrl-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text-mid); background: transparent; border: none; outline: none; transition: transform 0.15s, background 0.15s, color 0.15s; }
        .ctrl-btn:active, .ctrl-btn.pressed { background: rgba(245,200,66,0.15); color: var(--neon-gold); transform: scale(0.98); }
        .ctrl-mid { flex: 0.4; font-size: 10px; letter-spacing: 2px; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); }

        .grade-badge { font-family: 'JetBrains Mono', sans-serif; font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 10px; }
        .stat-grid { display: flex; gap: 20px; margin: 20px 0; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); text-align: center; min-width: 90px; }
        .stat-box .val { color: var(--neon-gold); font-size: 24px; font-weight: 700; font-family: 'Syne'; }
        .stat-box .lbl { font-size: 10px; color: var(--text-mid); text-transform: uppercase; margin-top: 4px; }
        #unlocks { font-size: 12px; color: var(--neon-teal); text-align: center; min-height: 20px; margin-bottom: 20px;}
        .vocab-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; width: min(100%, 420px); max-height: 220px; overflow-y: auto; margin-bottom: 18px; }
        .vocab-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 8px 10px; font-size: 11px; color: var(--text-mid); }
        .vocab-item.learned { color: var(--neon-teal); border-color: rgba(0,229,180,0.35); background: rgba(0,229,180,0.12); }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <button id="btn-sound" class="sound-btn" aria-label="Toggle sound">🔊 ON</button>

    <div id="screen-title" class="screen">
        <h1>Fast<span>Word</span><br>Sarawak</h1>
        <p>Race through Sarawak, learn the local slang, and survive the Ultimate Rajang Cup!</p>
        <button class="btn" id="btn-start-game">Start Engine</button>
        <button class="btn" id="btn-level-select">Select Level</button>
    </div>

    <div id="screen-levels" class="screen hidden">
        <h2>Select Track</h2>
        <div id="level-list" style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:300px; margin-top:20px;">
        </div>
        <button class="btn" id="btn-back-title" style="margin-top:30px;">Back</button>
    </div>

    <div id="screen-game" class="hidden">
        <div id="game-ui">
            <div id="top-hud">
                <div class="hud-stat"><span class="hud-lbl">Score</span><span class="hud-val" id="hud-score">0000</span></div>
                <div class="hud-stat"><span class="hud-lbl">Streak</span><span class="hud-val" id="hud-streak">x0</span></div>
                <div id="progress-wrap">
                    <span id="track-name">Level 1</span>
                    <div id="progress-bar"><div id="progress-fill"></div></div>
                </div>
                <div class="hud-stat"><span class="hud-lbl">Check</span><span class="hud-val" id="hud-check">0/10</span></div>
            </div>

            <div id="center-ui">
                <div id="prompt-text">What does "Sitok" mean?</div>
                <div id="audio-cue">DENGAR BAIT-BAIT!</div>

                <div id="banner-wrap">
                    <div class="banner" id="banner-left">Left</div>
                    <div class="banner" id="banner-right">Right</div>
                </div>

                <div id="feedback-text">+10 PTS - Nang Pandey!</div>
            </div>

            <div id="controls">
                <button class="ctrl-btn" id="btn-left">◀</button>
                <div class="ctrl-mid">DRIFT</div>
                <button class="ctrl-btn" id="btn-right">▶</button>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen hidden">
        <div class="grade-badge" id="res-grade">A</div>
        <h2 id="res-title" style="color:var(--neon-gold); font-family:'JetBrains Mono';">Nang Terer Driver!</h2>

        <div class="stat-grid">
            <div class="stat-box"><div class="val" id="res-score">0</div><div class="lbl">Score</div></div>
            <div class="stat-box"><div class="val" id="res-acc">0%</div><div class="lbl">Accuracy</div></div>
            <div class="stat-box"><div class="val" id="res-streak">x0</div><div class="lbl">Best Streak</div></div>
        </div>

        <div id="unlocks"></div>
        <div id="r-vocab" class="vocab-list"></div>

        <button class="btn" id="btn-retry">Retry</button>
        <button class="btn" id="btn-menu">Main Menu</button>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/render.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
